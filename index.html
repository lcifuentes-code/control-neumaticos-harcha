<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>NEUMATRACK · Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;
      --card-border: rgba(37,99,235,.7);
      --accent: #2563eb;
      --accent-soft: #1d4ed8;
      --accent-text: #e5f0ff;
      --text-main: #e5e7eb;
      --input-bg: #020617;
      --input-border: #111827;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,#1f2937 0,#020617 55%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--text-main);}
    .shell{width:100%;max-width:420px;background:radial-gradient(circle at top,#0b1220 0,#020617 58%);border-radius:24px;border:1px solid var(--card-border);box-shadow:0 0 0 1px rgba(15,23,42,.9),0 28px 80px rgba(0,0,0,.85);padding:28px 30px 24px;}
    @media(max-width:480px){.shell{padding:22px 18px 20px;border-radius:18px;}}
    .title{text-align:center;margin-bottom:6px;}
    .title-main{font-size:26px;letter-spacing:.24em;text-transform:uppercase;color:#e5f0ff;}
    .title-main span{font-weight:800;}
    .title-main strong{color:#3b82f6;}
    .title-sub{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(148,163,184,.9);margin-top:8px;}
    .title-sub small{font-size:10px;opacity:.9;}
    .tabs{display:flex;gap:6px;margin-top:22px;background:rgba(15,23,42,.9);border-radius:999px;padding:3px;border:1px solid rgba(15,23,42,.9);}
    .tab-btn{flex:1;border-radius:999px;border:none;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:8px 0;cursor:pointer;background:transparent;color:rgba(148,163,184,.9);font-weight:600;transition:all .17s ease-out;}
    .tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent-soft));color:var(--accent-text);box-shadow:0 10px 30px rgba(37,99,235,.7);}
    .tab-btn:not(.active):hover{color:#e5e7eb;}
    form{margin-top:22px;display:flex;flex-direction:column;gap:14px;}
    .field{display:flex;flex-direction:column;gap:5px;}
    .label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(156,163,175,.96);}
    .input{width:100%;border-radius:999px;border:1px solid var(--input-border);background:var(--input-bg);padding:9px 13px;font-size:13px;color:var(--text-main);outline:none;transition:all .16s ease-out;}
    .input::placeholder{color:rgba(107,114,128,.9);}
    .input:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(59,130,246,.7);}
    .primary-btn{margin-top:4px;width:100%;border-radius:999px;border:none;padding:10px 0;font-size:13px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent-soft));color:var(--accent-text);box-shadow:0 14px 36px rgba(37,99,235,.7);transition:all .18s ease-out;}
    .primary-btn:hover{filter:brightness(1.05);transform:translateY(-1px);}
    .primary-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;filter:none;}
    .divider{margin:16px 0 10px;height:1px;background:linear-gradient(to right,transparent,rgba(30,64,175,.7),transparent);}
    .guest-btn{width:100%;border-radius:999px;border:1px solid rgba(31,41,55,.95);background:rgba(15,23,42,.96);color:rgba(148,163,184,.96);padding:9px 0;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .16s ease-out;}
    .guest-btn:hover{color:#e5e7eb;background:rgba(15,23,42,1);}
    .guest-btn:disabled{opacity:.6;cursor:not-allowed;}
    .hint{margin-top:10px;font-size:10px;color:rgba(148,163,184,.9);text-align:center;line-height:1.4;}
    .toast{position:fixed;right:18px;bottom:18px;background:#020617;border-radius:12px;padding:9px 14px;font-size:12px;color:#e5e7eb;border:1px solid rgba(148,163,184,.75);box-shadow:0 12px 40px rgba(0,0,0,.8);opacity:0;transform:translateY(8px);transition:all .18s ease-out;pointer-events:none;z-index:20;max-width:340px;}
    .toast.show{opacity:1;transform:translateY(0);}
    .spin{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;margin-right:5px;vertical-align:middle;}
    @keyframes sp{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="shell">
  <div class="title">
    <div class="title-main"><span>NEUMA</span><strong>TRACK</strong></div>
    <div class="title-sub">SISTEMA GESTIÓN FLOTA TOLVA · <small>V2.0</small></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login" type="button" onclick="setMode('login')">INGRESAR</button>
    <button class="tab-btn" id="tab-register" type="button" onclick="setMode('register')">REGISTRARSE</button>
  </div>

  <form onsubmit="handleSubmit(event)">
    <div class="field">
      <label class="label" for="email">Email</label>
      <input id="email" class="input" type="email" placeholder="correo@empresa.com" required />
    </div>
    <div class="field">
      <label class="label" for="password">Contraseña</label>
      <input id="password" class="input" type="password" placeholder="••••••••" minlength="6" required />
    </div>
    <button type="submit" class="primary-btn" id="mainButton">Ingresar</button>
  </form>

  <div class="divider"></div>

  <button type="button" class="guest-btn" id="guestBtn" onclick="enterGuest()">
    <span>👁</span><span>Ingresar como Invitado (solo lectura)</span>
  </button>

  <div class="hint">Base de datos real · Los datos se guardan permanentemente.</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // =========================================================
  // ⚠ PEGA AQUÍ tu clave "anon public" de Supabase → Settings → API
  // =========================================================
  const SUPABASE_URL  = 'https://pitijaenpnuedkclzhom.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpdGlqYWVucG51ZWRrY2x6aG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTQ5MjEsImV4cCI6MjA4OTMzMDkyMX0.HsdzwO0wxcmSQ3vEIaAbSE3EUAxq32IREKoiAWMxmy8';
  // =========================================================

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  let mode = 'login';

  // Si ya hay sesión activa → ir directo al panel
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'panel.html';
  });

  function setMode(newMode) {
    mode = newMode;
    document.getElementById('tab-login').classList.toggle('active', mode === 'login');
    document.getElementById('tab-register').classList.toggle('active', mode === 'register');
    document.getElementById('mainButton').textContent = mode === 'login' ? 'Ingresar' : 'Crear cuenta';
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const pass  = document.getElementById('password').value;
    if (!email || !pass) return;

    setBusy('mainButton', true);

    if (mode === 'register') {
      const { error } = await sb.auth.signUp({ email, password: pass });
      setBusy('mainButton', false);
      if (error) { showToast('Error: ' + error.message); return; }
      showToast('¡Cuenta creada! Revisa tu correo para confirmar.');
      setMode('login');
      return;
    }

    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    setBusy('mainButton', false);
    if (error) { showToast('Credenciales incorrectas.'); return; }
    window.location.href = 'panel.html';
  }

  async function enterGuest() {
    setBusy('guestBtn', true);
    const { error } = await sb.auth.signInWithPassword({
      email: 'invitado@neumatrack.cl',
      password: 'invitado2025'
    });
    setBusy('guestBtn', false);
    if (error) {
      showToast('Usuario invitado no configurado. Pide al Admin que lo cree.');
      return;
    }
    window.location.href = 'panel.html';
  }

  function setBusy(id, on) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.disabled = on;
    if (on) { btn._t = btn.innerHTML; btn.innerHTML = '<span class="spin"></span>Cargando...'; }
    else     { btn.innerHTML = btn._t || btn.innerHTML; }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(window.__tt);
    window.__tt = setTimeout(() => t.classList.remove('show'), 3400);
  }
</script>
</body>
</html>
