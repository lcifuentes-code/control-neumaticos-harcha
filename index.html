<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>NEUMATRACK · Acceso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;
      --bg-soft: #020b1a;
      --card: #020b1a;
      --card-border: #1f2937;
      --accent: #2563eb;
      --accent-soft: #1d4ed8;
      --accent-text: #e5f0ff;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --input-bg: #020617;
      --input-border: #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text-main);
    }
    .shell {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top, #0b1220 0, #020617 58%);
      border-radius: 24px;
      border: 1px solid rgba(37, 99, 235, 0.7);
      box-shadow:
        0 0 0 1px rgba(15, 23, 42, 0.9),
        0 28px 80px rgba(0, 0, 0, 0.85);
      padding: 28px 30px 24px;
    }
    @media (max-width: 480px) {
      .shell { padding: 22px 18px 20px; border-radius: 18px; }
    }
    .title {
      text-align: center;
      margin-bottom: 6px;
    }
    .title-main {
      font-size: 26px;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: #e5f0ff;
    }
    .title-main span {
      font-weight: 800;
    }
    .title-main strong {
      color: #3b82f6;
    }
    .title-sub {
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(148, 163, 184, 0.9);
      margin-top: 8px;
    }
    .title-sub small {
      font-size: 10px;
      opacity: .9;
    }
    .tabs {
      display: flex;
      gap: 6px;
      margin-top: 22px;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 999px;
      padding: 3px;
      border: 1px solid rgba(15, 23, 42, 0.9);
    }
    .tab-btn {
      flex: 1;
      border-radius: 999px;
      border: none;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 8px 0;
      cursor: pointer;
      background: transparent;
      color: rgba(148, 163, 184, 0.9);
      font-weight: 600;
      transition: all .17s ease-out;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: var(--accent-text);
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.7);
    }
    .tab-btn:not(.active):hover {
      color: #e5e7eb;
    }
    form {
      margin-top: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .label {
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(156, 163, 175, 0.96);
    }
    .input {
      width: 100%;
      border-radius: 999px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      padding: 9px 13px;
      font-size: 13px;
      color: var(--text-main);
      outline: none;
      transition: all .16s ease-out;
    }
    .input::placeholder {
      color: rgba(107, 114, 128, 0.9);
    }
    .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.7);
    }
    .primary-btn {
      margin-top: 4px;
      width: 100%;
      border-radius: 999px;
      border: none;
      padding: 10px 0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: var(--accent-text);
      box-shadow: 0 14px 36px rgba(37, 99, 235, 0.7);
      transition: all .18s ease-out;
    }
    .primary-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .divider {
      margin: 16px 0 10px;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(30, 64, 175, 0.7),
        transparent
      );
    }
    .guest-btn {
      width: 100%;
      border-radius: 999px;
      border: 1px solid rgba(31, 41, 55, 0.95);
      background: rgba(15, 23, 42, 0.96);
      color: rgba(148, 163, 184, 0.96);
      padding: 9px 0;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all .16s ease-out;
    }
    .guest-btn:hover {
      color: #e5e7eb;
      background: rgba(15, 23, 42, 1);
    }
    .guest-icon {
      font-size: 13px;
    }
    .hint {
      margin-top: 10px;
      font-size: 10px;
      color: rgba(148, 163, 184, 0.9);
      text-align: center;
    }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #020617;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 11px;
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.75);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
      opacity: 0;
      transform: translateY(8px);
      transition: all .18s ease-out;
      pointer-events: none;
      z-index: 20;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="title">
      <div class="title-main">
        <span>NEUMA</span><strong>TRACK</strong>
      </div>
      <div class="title-sub">
        SISTEMA GESTIÓN FLOTA TOLVA · <small>V2.0</small>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="setMode('login')">
        INGRESAR
      </button>
      <button class="tab-btn" id="tab-register" onclick="setMode('register')">
        REGISTRARSE
      </button>
    </div>

    <form onsubmit="handleSubmit(event)">
      <div class="field">
        <label class="label" for="email">Email</label>
        <input
          id="email"
          class="input"
          type="email"
          placeholder="correo@empresa.com"
          required
        />
      </div>
      <div class="field">
        <label class="label" for="password">Contraseña</label>
        <input
          id="password"
          class="input"
          type="password"
          placeholder="••••••••"
          minlength="6"
          required
        />
      </div>

      <button type="submit" class="primary-btn" id="mainButton">
        Ingresar
      </button>
    </form>

    <div class="divider"></div>

    <button type="button" class="guest-btn" onclick="enterGuest()">
      <span class="guest-icon">👁</span>
      <span>Ingresar como Invitado (solo lectura)</span>
    </button>

    <div class="hint">
      Esta página es una maqueta visual.<br />
      Aquí todavía no se conecta a ninguna base de datos.
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
   function handleSubmit(event) {
  event.preventDefault();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  if (!email || !password) return;

  if (mode === "register") {
    showToast("En esta demo el registro es solo visual (no crea cuentas reales).");
    return;
  }

  if (email === "editor@empresa.com" && password === "editor2025") {
    showToast("Bienvenido EDITOR. Podrás operar neumáticos en el sistema real.");
  } else if (email === "admin@empresa.com" && password === "admin2025") {
    showToast("Bienvenido ADMIN. Tendrás control total en el sistema real.");
  } else {
    showToast("Credenciales incorrectas. Usa los usuarios de ejemplo.");
  }
}

function enterGuest() {
  showToast("Entraste como INVITADO (solo lectura).");
}

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(window.__toastTimeout);
      window.__toastTimeout = setTimeout(() => {
        toast.classList.remove("show");
      }, 2600);
    }
  </script>
</body>
</html>
